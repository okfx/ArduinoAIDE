<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Realistic: photo-accurate colors, subtle noise, true material appearance -->
    <linearGradient id="tealR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5bf"/>
      <stop offset="100%" stop-color="#00b894"/>
    </linearGradient>
    <!-- Realistic FR-4 PCB green (slightly brightened) -->
    <linearGradient id="pcbR" x1="0.4" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#247a44"/>
      <stop offset="15%" stop-color="#20703e"/>
      <stop offset="50%" stop-color="#1c6438"/>
      <stop offset="85%" stop-color="#175832"/>
      <stop offset="100%" stop-color="#124e2c"/>
    </linearGradient>
    <!-- Solder mask sheen -->
    <linearGradient id="pcbSheen" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="70%" stop-color="#000000" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.1"/>
    </linearGradient>
    <!-- Realistic ENIG gold (electroless nickel immersion gold) -->
    <linearGradient id="goldR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c84a"/>
      <stop offset="20%" stop-color="#d4aa38"/>
      <stop offset="50%" stop-color="#c49a30"/>
      <stop offset="80%" stop-color="#b08828"/>
      <stop offset="100%" stop-color="#9a7620"/>
    </linearGradient>
    <!-- QFP chip package - realistic epoxy -->
    <linearGradient id="chipR" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#28282e"/>
      <stop offset="40%" stop-color="#202026"/>
      <stop offset="100%" stop-color="#18181e"/>
    </linearGradient>
    <!-- Stainless steel USB shell -->
    <linearGradient id="usbR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8c8cc"/>
      <stop offset="15%" stop-color="#aaaaae"/>
      <stop offset="40%" stop-color="#909096"/>
      <stop offset="60%" stop-color="#888890"/>
      <stop offset="85%" stop-color="#78787e"/>
      <stop offset="100%" stop-color="#686870"/>
    </linearGradient>
    <linearGradient id="usbInner" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#303038"/>
      <stop offset="100%" stop-color="#1a1a22"/>
    </linearGradient>
    <!-- Copper trace color -->
    <linearGradient id="copperR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c87840"/>
      <stop offset="100%" stop-color="#a06030"/>
    </linearGradient>
    <linearGradient id="neuralR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5bf"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="bracketGlowR">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeGlowR">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="boardShadowR">
      <feDropShadow dx="1" dy="4" stdDeviation="10" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <filter id="ledGlowR">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- FR-4 fiberglass weave texture -->
    <pattern id="weave" patternUnits="userSpaceOnUse" width="4" height="4">
      <rect width="4" height="4" fill="transparent"/>
      <rect x="0" y="0" width="2" height="2" fill="#ffffff" fill-opacity="0.015"/>
      <rect x="2" y="2" width="2" height="2" fill="#ffffff" fill-opacity="0.015"/>
    </pattern>

    <!-- Via hole pattern for realism -->
    <radialGradient id="viaGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#d4aa38"/>
      <stop offset="60%" stop-color="#b08828"/>
      <stop offset="100%" stop-color="#806018"/>
    </radialGradient>
  </defs>

  <!-- ============================================ -->
  <!-- LAYERS 1+2: Background rotated -40deg        -->
  <!-- ============================================ -->
  <g transform="rotate(-35, 256, 256)">

  <!-- LAYER 1: NEURAL NETWORK (furthest back) -->
  <g filter="url(#nodeGlowR)">
    <g stroke="url(#neuralR)" stroke-width="1.8" stroke-opacity="0.3">
      <line x1="110" y1="100" x2="256" y2="180"/>
      <line x1="400" y1="90" x2="310" y2="190"/>
      <line x1="50" y1="260" x2="170" y2="240"/>
      <line x1="462" y1="250" x2="340" y2="240"/>
      <line x1="80" y1="420" x2="200" y2="330"/>
      <line x1="430" y1="410" x2="320" y2="320"/>
      <line x1="256" y1="380" x2="256" y2="460"/>
      <line x1="160" y1="50" x2="256" y2="140"/>
      <line x1="350" y1="50" x2="300" y2="150"/>
      <line x1="110" y1="100" x2="50" y2="260"/>
      <line x1="400" y1="90" x2="462" y2="250"/>
      <line x1="50" y1="260" x2="80" y2="420"/>
      <line x1="462" y1="250" x2="430" y2="410"/>
      <line x1="80" y1="420" x2="256" y2="460"/>
      <line x1="430" y1="410" x2="256" y2="460"/>
      <line x1="110" y1="100" x2="160" y2="50"/>
      <line x1="400" y1="90" x2="350" y2="50"/>
      <line x1="160" y1="50" x2="350" y2="50"/>
      <line x1="110" y1="100" x2="400" y2="90"/>
      <line x1="50" y1="260" x2="462" y2="250"/>
      <line x1="80" y1="420" x2="430" y2="410"/>
      <line x1="160" y1="50" x2="80" y2="420"/>
      <line x1="350" y1="50" x2="430" y2="410"/>
    </g>

    <circle cx="160" cy="50" r="8" fill="#a78bfa" fill-opacity="0.5"/>
    <circle cx="350" cy="50" r="7" fill="#00e5bf" fill-opacity="0.5"/>
    <circle cx="110" cy="100" r="9" fill="#00e5bf" fill-opacity="0.55"/>
    <circle cx="400" cy="90" r="8" fill="#a78bfa" fill-opacity="0.55"/>
    <circle cx="50" cy="260" r="9" fill="#a78bfa" fill-opacity="0.5"/>
    <circle cx="462" cy="250" r="8" fill="#00e5bf" fill-opacity="0.5"/>
    <circle cx="80" cy="420" r="8" fill="#00e5bf" fill-opacity="0.5"/>
    <circle cx="430" cy="410" r="9" fill="#a78bfa" fill-opacity="0.5"/>
    <circle cx="256" cy="460" r="7" fill="#a78bfa" fill-opacity="0.5"/>

    <circle cx="36" cy="160" r="4" fill="#00e5bf" fill-opacity="0.35"/>
    <circle cx="476" cy="160" r="4" fill="#a78bfa" fill-opacity="0.35"/>
    <circle cx="36" cy="350" r="5" fill="#a78bfa" fill-opacity="0.35"/>
    <circle cx="476" cy="350" r="5" fill="#00e5bf" fill-opacity="0.35"/>
    <circle cx="170" cy="470" r="4" fill="#00e5bf" fill-opacity="0.35"/>
    <circle cx="340" cy="470" r="4" fill="#a78bfa" fill-opacity="0.35"/>
    <circle cx="80" cy="50" r="4" fill="#a78bfa" fill-opacity="0.3"/>
    <circle cx="430" cy="50" r="4" fill="#00e5bf" fill-opacity="0.3"/>
  </g>

  <!-- ============================================ -->
  <!-- LAYER 2: CODE BRACKETS (behind the board)    -->
  <!-- ============================================ -->
  <g filter="url(#bracketGlowR)">
    <path d="M 118 140 L 68 236 L 118 332"
          stroke="url(#tealR)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M 394 180 L 444 276 L 394 372"
          stroke="url(#tealR)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  </g><!-- end background rotation -->

  <!-- ============================================ -->
  <!-- LAYER 3: TEENSY BOARD (foreground)           -->
  <!-- Realistic: accurate materials, subtle detail -->
  <!-- ============================================ -->
  <g transform="translate(256, 256) rotate(-30)" filter="url(#boardShadowR)">

    <!-- PCB body — realistic FR-4 solder mask green -->
    <rect x="-86" y="-182" width="172" height="376" rx="6" ry="6"
          fill="url(#pcbR)"/>
    <!-- Fiberglass weave texture -->
    <rect x="-86" y="-182" width="172" height="376" rx="6" ry="6"
          fill="url(#weave)"/>
    <!-- Solder mask sheen -->
    <rect x="-86" y="-182" width="172" height="376" rx="6" ry="6"
          fill="url(#pcbSheen)"/>
    <!-- Board edge bevel — very subtle -->
    <rect x="-86" y="-182" width="172" height="376" rx="6" ry="6"
          fill="none" stroke="#0e3a20" stroke-width="1"/>
    <rect x="-85" y="-181" width="170" height="374" rx="5.5" ry="5.5"
          fill="none" stroke="#329a55" stroke-width="0.5" stroke-opacity="0.3"/>

    <!-- USB-C connector — brushed stainless steel look -->
    <rect x="-30" y="-206" width="60" height="28" rx="4" ry="4"
          fill="url(#usbR)" stroke="#606068" stroke-width="1"/>
    <!-- USB mold line -->
    <line x1="-28" y1="-192" x2="28" y2="-192" stroke="#666" stroke-width="0.5" stroke-opacity="0.4"/>
    <!-- USB inner port -->
    <rect x="-22" y="-202" width="44" height="13" rx="2.5" ry="2.5"
          fill="url(#usbInner)"/>
    <!-- USB tongue (white plastic) -->
    <rect x="-18" y="-200" width="36" height="8" rx="1.5" ry="1.5"
          fill="#e0e0e4"/>
    <!-- USB contact pads (centered within tongue: x=-18 to x=18) -->
    <g fill="#c8a030">
      <rect x="-9.75" y="-199" width="2.5" height="6" rx="0.5"/>
      <rect x="-3.75" y="-199" width="2.5" height="6" rx="0.5"/>
      <rect x="1.25" y="-199" width="2.5" height="6" rx="0.5"/>
      <rect x="7.25" y="-199" width="2.5" height="6" rx="0.5"/>
    </g>
    <!-- USB top highlight -->
    <rect x="-29" y="-206" width="58" height="2" rx="1"
          fill="#ffffff" fill-opacity="0.12"/>

    <!-- Main IC chip — realistic QFP epoxy package -->
    <rect x="-42" y="-70" width="84" height="84" rx="3" ry="3"
          fill="url(#chipR)" stroke="#35353d" stroke-width="1"/>
    <!-- Chip surface texture — very subtle matte -->
    <rect x="-42" y="-70" width="84" height="30" rx="3" ry="3"
          fill="#ffffff" fill-opacity="0.02"/>
    <!-- Laser etch marks (realistic chip markings) -->
    <g fill="#555" fill-opacity="0.25">
      <rect x="-30" y="-52" width="28" height="2" rx="1"/>
      <rect x="-30" y="-44" width="36" height="2" rx="1"/>
      <rect x="-30" y="-36" width="22" height="2" rx="1"/>
    </g>

    <!-- Gold through-hole pads — left side (14 pins) -->
    <g fill="url(#goldR)" stroke="#8a6a18" stroke-width="0.5">
      <rect x="-100" y="-158" width="18" height="7" rx="1.5"/>
      <rect x="-100" y="-134" width="18" height="7" rx="1.5"/>
      <rect x="-100" y="-110" width="18" height="7" rx="1.5"/>
      <rect x="-100" y="-86" width="18" height="7" rx="1.5"/>
      <rect x="-100" y="-62" width="18" height="7" rx="1.5"/>
      <rect x="-100" y="-38" width="18" height="7" rx="1.5"/>
      <rect x="-100" y="-14" width="18" height="7" rx="1.5"/>
      <rect x="-100" y="10" width="18" height="7" rx="1.5"/>
      <rect x="-100" y="34" width="18" height="7" rx="1.5"/>
      <rect x="-100" y="58" width="18" height="7" rx="1.5"/>
      <rect x="-100" y="82" width="18" height="7" rx="1.5"/>
      <rect x="-100" y="106" width="18" height="7" rx="1.5"/>
      <rect x="-100" y="130" width="18" height="7" rx="1.5"/>
      <rect x="-100" y="154" width="18" height="7" rx="1.5"/>
    </g>

    <!-- Gold through-hole pads — right side (14 pins) -->
    <g fill="url(#goldR)" stroke="#8a6a18" stroke-width="0.5">
      <rect x="82" y="-158" width="18" height="7" rx="1.5"/>
      <rect x="82" y="-134" width="18" height="7" rx="1.5"/>
      <rect x="82" y="-110" width="18" height="7" rx="1.5"/>
      <rect x="82" y="-86" width="18" height="7" rx="1.5"/>
      <rect x="82" y="-62" width="18" height="7" rx="1.5"/>
      <rect x="82" y="-38" width="18" height="7" rx="1.5"/>
      <rect x="82" y="-14" width="18" height="7" rx="1.5"/>
      <rect x="82" y="10" width="18" height="7" rx="1.5"/>
      <rect x="82" y="34" width="18" height="7" rx="1.5"/>
      <rect x="82" y="58" width="18" height="7" rx="1.5"/>
      <rect x="82" y="82" width="18" height="7" rx="1.5"/>
      <rect x="82" y="106" width="18" height="7" rx="1.5"/>
      <rect x="82" y="130" width="18" height="7" rx="1.5"/>
      <rect x="82" y="154" width="18" height="7" rx="1.5"/>
    </g>

    <!-- SMD components — realistic 0603/0805 packages -->
    <!-- Ceramic capacitor (tan body, silver terminals) -->
    <g>
      <rect x="28" y="-140" width="22" height="10" rx="1" fill="#b09870"/>
      <rect x="28" y="-140" width="5" height="10" rx="0.5" fill="#aaa"/>
      <rect x="45" y="-140" width="5" height="10" rx="0.5" fill="#aaa"/>
    </g>
    <!-- Resistor (black body, silver terminals) -->
    <g>
      <rect x="-52" y="42" width="16" height="8" rx="1" fill="#1a1a1a"/>
      <rect x="-52" y="42" width="4" height="8" rx="0.5" fill="#aaa"/>
      <rect x="-40" y="42" width="4" height="8" rx="0.5" fill="#aaa"/>
    </g>
    <!-- Another capacitor -->
    <g>
      <rect x="38" y="98" width="14" height="7" rx="1" fill="#b09870"/>
      <rect x="38" y="98" width="4" height="7" rx="0.5" fill="#aaa"/>
      <rect x="48" y="98" width="4" height="7" rx="0.5" fill="#aaa"/>
    </g>
    <!-- Small resistor -->
    <g>
      <rect x="-46" y="110" width="12" height="6" rx="1" fill="#1a1a1a"/>
      <rect x="-46" y="110" width="3" height="6" rx="0.5" fill="#aaa"/>
      <rect x="-37" y="110" width="3" height="6" rx="0.5" fill="#aaa"/>
    </g>

    <!-- Crystal oscillator -->
    <rect x="-20" y="-120" width="18" height="10" rx="1.5" fill="#c0c0c4" stroke="#999" stroke-width="0.5"/>
    <rect x="-18" y="-118" width="14" height="2" rx="0.5" fill="#ffffff" fill-opacity="0.15"/>

    <!-- Vias (plated through-holes) -->
    <g>
      <circle cx="-55" cy="-100" r="3" fill="url(#viaGrad)" stroke="#806018" stroke-width="0.5"/>
      <circle cx="-55" cy="-100" r="1" fill="#124e2c"/>
      <circle cx="55" cy="40" r="3" fill="url(#viaGrad)" stroke="#806018" stroke-width="0.5"/>
      <circle cx="55" cy="40" r="1" fill="#124e2c"/>
      <circle cx="-30" cy="70" r="2.5" fill="url(#viaGrad)" stroke="#806018" stroke-width="0.5"/>
      <circle cx="-30" cy="70" r="0.8" fill="#124e2c"/>
      <circle cx="30" cy="-100" r="2.5" fill="url(#viaGrad)" stroke="#806018" stroke-width="0.5"/>
      <circle cx="30" cy="-100" r="0.8" fill="#124e2c"/>
    </g>

    <!-- Teensy onboard LED — realistic SMD LED (orange/amber) -->
    <g filter="url(#ledGlowR)">
      <circle cx="42" cy="-122" r="5.5" fill="#ff7700"/>
    </g>
    <circle cx="42" cy="-122" r="12" fill="#ff6b00" fill-opacity="0.08"/>
    <!-- LED lens highlight -->
    <circle cx="40.5" cy="-123.5" r="2" fill="#ffffff" fill-opacity="0.3"/>
    <!-- LED body outline -->
    <circle cx="42" cy="-122" r="5.5" fill="none" stroke="#cc5500" stroke-width="0.5"/>

    <!-- Copper traces under solder mask (realistic warm copper color) -->
    <g stroke="url(#copperR)" stroke-width="1.6" stroke-opacity="0.2" fill="none" stroke-linecap="round">
      <path d="M -42 -28 L -68 -28 L -68 -65"/>
      <path d="M 42 -28 L 68 -28 L 68 15"/>
      <path d="M 0 14 L 0 50 L -40 50"/>
      <path d="M 42 14 L 62 14 L 62 55"/>
      <path d="M -30 14 L -30 35 L -55 35"/>
      <!-- Additional traces for realism -->
      <path d="M -42 -50 L -65 -50 L -65 -85"/>
      <path d="M 42 -50 L 65 -50 L 65 -65"/>
      <path d="M -10 14 L -10 80 L -45 80"/>
      <path d="M 20 14 L 20 70 L 50 70"/>
    </g>

    <!-- White silkscreen component outlines -->
    <g stroke="#e8e8d8" stroke-width="0.6" stroke-opacity="0.15" fill="none">
      <rect x="26" y="-142" width="26" height="14" rx="1"/>
      <rect x="-54" y="40" width="20" height="12" rx="1"/>
      <rect x="36" y="96" width="18" height="11" rx="1"/>
      <rect x="-48" y="108" width="16" height="10" rx="1"/>
      <rect x="-44" y="-72" width="88" height="88" rx="2"/>
    </g>
  </g>
</svg>